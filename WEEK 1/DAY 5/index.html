<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COUNTER APP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="counter-container">
        <h2>Counter</h2>
        <div id="display" class="count-display">0</div>
        <div id="warning" class="warning-text"></div>
        
        <div class="button-group">
            <button id="btn-decrement" class="btn">-</button>
            <button id="btn-reset" class="btn reset-btn">Reset</button> 
            <button id="btn-increment" class="btn">+</button>
        </div>
    </div>
    
    <script src="script.js"></script> 
</body>
</html>
